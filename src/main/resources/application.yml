spring:
  application:
    name: toeic-learn
  datasource:
    url: jdbc:h2:file:./data/toeic-learn
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: embedded
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    cache: false

server:
  port: 8080

app:
  practice:
    default-question-count: 20
    option-count: 4
