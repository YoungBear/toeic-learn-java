<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '托业学习系统'">托业学习系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a th:href="@{/}" class="brand">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                托业学习系统
            </a>
            <ul class="nav-menu">
                <li><a th:href="@{/}" th:classappend="${#httpServletRequest.requestURI == '/'} ? 'active' : ''">首页</a></li>
                <li><a th:href="@{/vocabulary}" th:classappend="${#httpServletRequest.requestURI.startsWith('/vocabulary')} ? 'active' : ''">词汇管理</a></li>
                <li><a th:href="@{/practice}" th:classappend="${#httpServletRequest.requestURI.startsWith('/practice')} ? 'active' : ''">练习中心</a></li>
                <li><a th:href="@{/import-export}" th:classappend="${#httpServletRequest.requestURI.startsWith('/import-export')} ? 'active' : ''">导入导出</a></li>
                <li><a th:href="@{/listening}" class="reserved">听力(预留)</a></li>
                <li><a th:href="@{/reading}" class="reserved">阅读(预留)</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" th:fragment="content">
        <div th:replace="~{${content} :: content}"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 托业学习系统 v1.0 | 预留接口: 听力 v2.0 | 阅读 v2.0</p>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
