<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托业学习系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1>欢迎使用托业学习系统</h1>
            <p class="subtitle">高效记忆词汇，轻松应对托业考试</p>
            <div class="hero-actions">
                <a th:href="@{/practice}" class="btn btn-primary btn-lg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    开始练习
                </a>
                <a th:href="@{/vocabulary}" class="btn btn-outline btn-lg">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    词汇管理
                </a>
            </div>
        </div>
    </div>

    <div class="container">
        <section class="stats-section">
            <h2>学习概览</h2>
            <div class="stats-grid" th:if="${stats}">
                <div class="stat-card primary">
                    <div class="stat-value" th:text="${stats.totalWords}">0</div>
                    <div class="stat-label">词汇总量</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" th:text="${stats.masteredWords}">0</div>
                    <div class="stat-label">已掌握</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" th:text="${stats.dueForReview}">0</div>
                    <div class="stat-label">待复习</div>
                </div>
                <div class="stat-card info">
                    <div class="stat-value" th:text="${stats.totalPracticeCount}">0</div>
                    <div class="stat-label">练习次数</div>
                </div>
            </div>

            <div class="accuracy-section" th:if="${stats != null and stats.totalPracticeCount > 0}">
                <h3>近期正确率</h3>
                <div class="accuracy-bar">
                    <div class="accuracy-fill" th:style="'width:' + ${stats.accuracyRate} + '%'"></div>
                </div>
                <div class="accuracy-text">
                    <span th:text="${stats.correctCount}">0</span> 正确 /
                    <span th:text="${stats.totalPracticeCount}">0</span> 总数
                    (<span th:text="${stats.accuracyRate}">0</span>%)
                </div>
            </div>
        </section>

        <section class="quick-actions">
            <h2>快捷入口</h2>
            <div class="action-cards">
                <a th:href="@{/practice/do(count=10)}" class="action-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        快速练习
                    </h3>
                    <p>10题词汇练习</p>
                </a>
                <a th:href="@{/practice/do(count=20)}" class="action-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        标准练习
                    </h3>
                    <p>20题词汇练习</p>
                </a>
                <a th:href="@{/practice/do(count=50)}" class="action-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                        </svg>
                        强化练习
                    </h3>
                    <p>50题词汇练习</p>
                </a>
                <a th:href="@{/practice/review}" class="action-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        复习
                    </h3>
                    <p>待复习词汇</p>
                </a>
            </div>
        </section>

        <section class="reserved-section">
            <h2>预留模块</h2>
            <div class="reserved-cards">
                <div class="reserved-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <path d="M9 18V5l12-2v13"></path>
                            <circle cx="6" cy="18" r="3"></circle>
                            <circle cx="18" cy="16" r="3"></circle>
                        </svg>
                        听力模块
                    </h3>
                    <p>计划于 v2.0 发布</p>
                    <a th:href="@{/api/listening/practice}" class="btn btn-disabled">即将推出</a>
                </div>
                <div class="reserved-card">
                    <h3>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        阅读模块
                    </h3>
                    <p>计划于 v2.0 发布</p>
                    <a th:href="@{/api/reading/practice}" class="btn btn-disabled">即将推出</a>
                </div>
            </div>
        </section>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
