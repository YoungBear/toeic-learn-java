<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习 - 托业学习系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>待复习词汇</h1>
            <a th:href="@{/practice}" class="btn btn-outline">返回练习中心</a>
        </div>

        <div id="reviewList" class="word-review-list">
            <div th:if="${#lists.isEmpty(words)}" class="empty-state">
                <h2>太棒了！</h2>
                <p>目前没有需要复习的词汇</p>
                <a th:href="@{/practice}" class="btn btn-primary">去练习</a>
            </div>

            <table th:if="${not #lists.isEmpty(words)}" class="data-table">
                <thead>
                    <tr>
                        <th>英文</th>
                        <th>中文</th>
                        <th>音标</th>
                        <th>例句</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="word : ${words}">
                        <td><strong th:text="${word.english}">-</strong></td>
                        <td th:text="${word.chinese}">-</td>
                        <td class="text-muted" th:text="${word.phonetic}">-</td>
                        <td class="text-muted" th:text="${word.exampleSentence}">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
