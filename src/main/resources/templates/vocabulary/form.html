<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${vocabulary.id} ? '编辑词汇书' : '新建词汇书'">词汇书表单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 th:text="${vocabulary.id} ? '编辑词汇书' : '新建词汇书'">词汇书表单</h1>
        </div>

        <form th:action="@{/vocabulary}" th:object="${vocabulary}" method="post" class="form">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="name">名称 <span class="required">*</span></label>
                <input type="text" id="name" th:field="*{name}" required class="form-control" placeholder="例如：商务基础词汇">
            </div>

            <div class="form-group">
                <label for="description">描述</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="词汇书的简要描述"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/vocabulary}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
